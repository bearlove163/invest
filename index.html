<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实盘追踪仪表盘</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d3a;
      --text: #e0e3ed;
      --text-dim: #8b8fa8;
      --green: #00d4a1;
      --red: #ff4d6a;
      --blue: #4d9fff;
      --yellow: #ffc53d;
      --purple: #9d72ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .header h1 { font-size: 20px; font-weight: 700; color: var(--blue); }
    .header .updated { font-size: 12px; color: var(--text-dim); }
    .tag-live {
      background: var(--green);
      color: #000;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 10px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-card .label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
    .stat-card .value { font-size: 22px; font-weight: 700; }
    .stat-card .sub { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
    .up { color: var(--green); }
    .down { color: var(--red); }
    .neutral { color: var(--text-dim); }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      background: var(--blue);
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    #navChart { width: 100%; height: 300px; }

    .positions-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .positions-table th {
      color: var(--text-dim);
      font-weight: 600;
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .positions-table td {
      padding: 10px 10px;
      border-bottom: 1px solid var(--border);
    }
    .positions-table tr:last-child td { border-bottom: none; }
    .positions-table .ticker { font-weight: 700; color: var(--blue); }
    .positions-table .name { color: var(--text-dim); font-size: 12px; }
    .positions-table .pnl-up { color: var(--green); font-weight: 600; }
    .positions-table .pnl-down { color: var(--red); font-weight: 600; }
    .tag-hold { background: rgba(0,212,161,0.15); color: var(--green); font-size:10px; padding:2px 6px; border-radius:4px; }
    .tag-buy { background: rgba(77,159,255,0.15); color: var(--blue); font-size:10px; padding:2px 6px; border-radius:4px; }
    .tag-sell { background: rgba(255,77,106,0.15); color: var(--red); font-size:10px; padding:2px 6px; border-radius:4px; }
    .tag-watch { background: rgba(255,197,61,0.15); color: var(--yellow); font-size:10px; padding:2px 6px; border-radius:4px; }
    .price-cell { font-weight: 600; }

    .trades-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .trades-table th {
      color: var(--text-dim);
      font-weight: 600;
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .trades-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }
    .trades-table tr:last-child td { border-bottom: none; }

    .weekly-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .weekly-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .weekly-item:last-child { border-bottom: none; }
    .weekly-icon { font-size: 18px; flex-shrink: 0; }
    .weekly-content .week-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
    .weekly-content .stock { font-size: 14px; font-weight: 700; color: var(--blue); }
    .weekly-content .plan { font-size: 12px; color: var(--text); margin-top: 2px; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
      font-size: 13px;
    }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }

    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      overflow-x: auto;
    }
    .tab-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .refresh-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .refresh-btn:hover { border-color: var(--blue); }

    .meta-info {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
    }
    .meta-info .info-item { font-size: 12px; color: var(--text-dim); }
    .meta-info .info-item span { color: var(--text); font-weight: 600; }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .stat-card .value { font-size: 18px; }
      .positions-table { font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>📊 实盘追踪仪表盘</h1>
    <div class="updated">数据文件：data/portfolio.json &nbsp;|&nbsp; <span id="lastUpdated">—</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="tag-live">LIVE</span>
    <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
  </div>
</div>

<!-- 概览卡片 -->
<div class="grid" id="overviewGrid">
  <div class="stat-card">
    <div class="label">当前净值</div>
    <div class="value" id="statNAV">—</div>
    <div class="sub" id="statDate">—</div>
  </div>
  <div class="stat-card">
    <div class="label">总收益率</div>
    <div class="value" id="statReturn">—</div>
    <div class="sub" id="statDaily">—</div>
  </div>
  <div class="stat-card">
    <div class="label">超额收益</div>
    <div class="value" id="statExcess">—</div>
    <div class="sub">vs 沪深300</div>
  </div>
  <div class="stat-card">
    <div class="label">沪深300</div>
    <div class="value" id="statHS300">—</div>
    <div class="sub" id="statHS300Change">—</div>
  </div>
  <div class="stat-card">
    <div class="label">持仓市值</div>
    <div class="value" id="statPositionValue">—</div>
    <div class="sub" id="statPositionCount">—</div>
  </div>
  <div class="stat-card">
    <div class="label">可用资金</div>
    <div class="value" id="statCash">—</div>
    <div class="sub">/ 初始 <span id="statCapital">—</span></div>
  </div>
</div>

<!-- Tab 切换 -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('nav')">📈 净值曲线</button>
  <button class="tab-btn" onclick="switchTab('positions')">💼 持仓看板</button>
  <button class="tab-btn" onclick="switchTab('trades')">📋 交易记录</button>
  <button class="tab-btn" onclick="switchTab('weekly')">📌 本周计划</button>
</div>

<!-- 净值曲线 -->
<div id="tab-nav" class="tab-content active">
  <div class="chart-card">
    <div id="navChart"></div>
  </div>
</div>

<!-- 持仓看板 -->
<div id="tab-positions" class="tab-content">
  <div class="chart-card">
    <div id="positionsContent"></div>
  </div>
</div>

<!-- 交易记录 -->
<div id="tab-trades" class="tab-content">
  <div class="chart-card">
    <div id="tradesContent"></div>
  </div>
</div>

<!-- 本周计划 -->
<div id="tab-weekly" class="tab-content">
  <div class="weekly-card">
    <div id="weeklyContent"></div>
  </div>
</div>

<script>
let chart = null;
let rawData = null;

function fmtMoney(v) {
  if (v === null || v === undefined) return '—';
  return '¥' + Number(v).toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function fmtPct(v) {
  if (v === null || v === undefined) return '—';
  const sign = v >= 0 ? '+' : '';
  return sign + (v * 100).toFixed(2) + '%';
}
function fmtDate(d) {
  if (!d) return '—';
  return d;
}
function getColorClass(v) {
  if (v > 0) return 'up';
  if (v < 0) return 'down';
  return 'neutral';
}

async function loadData() {
  try {
    const resp = await fetch('data/portfolio.json?_=' + Date.now());
    rawData = await resp.json();
    renderAll(rawData);
  } catch(e) {
    console.error('加载失败', e);
  }
}

function renderAll(data) {
  renderOverview(data);
  renderChart(data);
  renderPositions(data);
  renderTrades(data);
  renderWeekly(data);
  document.getElementById('lastUpdated').textContent = '最后刷新：' + new Date().toLocaleTimeString('zh-CN');
}

function renderOverview(data) {
  const nav = data.nav || {};
  const meta = data.meta || {};
  const positions = data.positions || [];
  const capital = meta.capital || 1000000;

  // 计算持仓市值
  let posValue = 0;
  positions.forEach(p => {
    const price = p.currentPrice || p.cost || 0;
    const qty = p.quantity || 0;
    posValue += price * qty;
  });

  const cash = (nav.value || capital) - posValue;

  document.getElementById('statNAV').textContent = fmtMoney(nav.value);
  document.getElementById('statDate').textContent = '日期：' + fmtDate(nav.date);
  document.getElementById('statReturn').innerHTML = `<span class="${getColorClass(nav.totalReturn)}">${fmtPct(nav.totalReturn)}</span>`;
  document.getElementById('statDaily').textContent = '日涨跌 ' + fmtPct(nav.dailyReturn);
  document.getElementById('statExcess').innerHTML = `<span class="${getColorClass(nav.excessReturn)}">${fmtPct(nav.excessReturn)}</span>`;
  document.getElementById('statHS300').textContent = nav.hs300 ? nav.hs300.toFixed(2) : '—';
  document.getElementById('statHS300Change').textContent = '涨跌 ' + fmtPct(nav.hs300Change);
  document.getElementById('statPositionValue').textContent = fmtMoney(posValue);
  document.getElementById('statPositionCount').textContent = positions.length + ' 只股票';
  document.getElementById('statCash').textContent = fmtMoney(cash);
  document.getElementById('statCapital').textContent = fmtMoney(capital);
}

function renderChart(data) {
  const navHistory = data.navHistory || [];
  const nav = data.nav || {};
  const meta = data.meta || {};
  const benchmarkStart = meta.benchmarkStartValue || 4676.12;

  if (!chart) {
    chart = echarts.init(document.getElementById('navChart'));
  }

  // 如果没有历史数据，用当前数据初始化一条单点线
  let dates = [], navValues = [], benchmarkValues = [];

  if (navHistory.length === 0) {
    // 单点演示数据
    dates = [nav.date || '2026-04-15'];
    navValues = [100];
    benchmarkValues = [100];
  } else {
    navHistory.forEach(item => {
      dates.push(item.date);
      // 归一化：首日=100
      navValues.push((item.value / (meta.capital || 1000000)) * 100);
      if (item.hs300 && benchmarkStart) {
        benchmarkValues.push((item.hs300 / benchmarkStart) * 100);
      }
    });
  }

  const option = {
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'axis',
      backgroundColor: '#1a1d27',
      borderColor: '#2a2d3a',
      textStyle: { color: '#e0e3ed' },
      formatter: function(params) {
        let res = '<div style="font-weight:700;margin-bottom:4px;">' + params[0].axisValue + '</div>';
        params.forEach(p => {
          const color = p.seriesName === '组合净值' ? '#4d9fff' : '#ffc53d';
          res += '<div style="display:flex;justify-content:space-between;gap:16px;">' +
                 '<span style="color:' + color + ';">' + p.seriesName + '</span>' +
                 '<span>' + p.value.toFixed(2) + '</span></div>';
        });
        return res;
      }
    },
    legend: {
      data: ['组合净值', '沪深300'],
      textStyle: { color: '#8b8fa8', fontSize: 12 },
      top: 0,
      right: 0,
    },
    grid: { left: 50, right: 16, top: 40, bottom: 30 },
    xAxis: {
      type: 'category',
      data: dates,
      axisLine: { lineStyle: { color: '#2a2d3a' } },
      axisLabel: { color: '#8b8fa8', fontSize: 11 },
      axisTick: { show: false },
    },
    yAxis: {
      type: 'value',
      splitLine: { lineStyle: { color: '#2a2d3a', type: 'dashed' } },
      axisLabel: { color: '#8b8fa8', fontSize: 11, formatter: v => v.toFixed(1) },
    },
    series: [
      {
        name: '组合净值',
        type: 'line',
        data: navValues,
        smooth: true,
        symbol: 'circle',
        symbolSize: 5,
        lineStyle: { color: '#4d9fff', width: 2 },
        itemStyle: { color: '#4d9fff' },
        areaStyle: {
          color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
            { offset: 0, color: 'rgba(77,159,255,0.25)' },
            { offset: 1, color: 'rgba(77,159,255,0.02)' }
          ])
        }
      },
      {
        name: '沪深300',
        type: 'line',
        data: benchmarkValues,
        smooth: true,
        symbol: 'circle',
        symbolSize: 4,
        lineStyle: { color: '#ffc53d', width: 2, type: 'dashed' },
        itemStyle: { color: '#ffc53d' },
      }
    ]
  };

  chart.setOption(option, true);
  window.addEventListener('resize', () => chart && chart.resize());
}

function renderPositions(data) {
  const positions = data.positions || [];
  const container = document.getElementById('positionsContent');

  if (positions.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div>暂无持仓记录<br><span style="font-size:11px;">请在 portfolio.json 中添加 positions 数据</span></div>';
    return;
  }

  let html = `
  <table class="positions-table">
    <thead>
      <tr>
        <th>股票</th>
        <th>持仓成本</th>
        <th>现价</th>
        <th>盈亏额</th>
        <th>盈亏%</th>
        <th>数量</th>
        <th>止损价</th>
        <th>目标价</th>
        <th>备注</th>
      </tr>
    </thead>
    <tbody>
  `;

  positions.forEach(p => {
    const cost = p.cost || 0;
    const price = p.currentPrice || cost;
    const qty = p.quantity || 0;
    const pnl = (price - cost) * qty;
    const pnlPct = cost > 0 ? (price - cost) / cost : 0;
    const tag = p.tag || 'hold';

    html += `
    <tr>
      <td>
        <div class="ticker">${p.ticker || '—'}</div>
        <div class="name">${p.name || '—'}</div>
      </td>
      <td class="price-cell">${fmtMoney(cost)}</td>
      <td class="price-cell">${fmtMoney(price)}</td>
      <td class="${pnl >= 0 ? 'pnl-up' : 'pnl-down'}">${pnl >= 0 ? '+' : ''}${fmtMoney(pnl)}</td>
      <td class="${pnl >= 0 ? 'pnl-up' : 'pnl-down'}">${fmtPct(pnlPct)}</td>
      <td>${qty}</td>
      <td style="color:var(--red);">${p.stopLoss ? fmtMoney(p.stopLoss) : '—'}</td>
      <td style="color:var(--green);">${p.targetPrice ? fmtMoney(p.targetPrice) : '—'}</td>
      <td><span class="tag-${tag}">${tag === 'hold' ? '持仓' : tag === 'buy' ? '买入' : tag === 'sell' ? '卖出' : '观察'}</span></td>
    </tr>
    `;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

function renderTrades(data) {
  const trades = data.trades || [];
  const container = document.getElementById('tradesContent');

  if (trades.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📝</div>暂无交易记录<br><span style="font-size:11px;">请在 portfolio.json 中添加 trades 数据</span></div>';
    return;
  }

  let html = `
  <table class="trades-table">
    <thead>
      <tr>
        <th>日期</th>
        <th>股票</th>
        <th>方向</th>
        <th>价格</th>
        <th>数量</th>
        <th>金额</th>
        <th>备注</th>
      </tr>
    </thead>
    <tbody>
  `;

  trades.slice().reverse().forEach(t => {
    const amount = (t.price || 0) * (t.quantity || 0);
    html += `
    <tr>
      <td>${t.date || '—'}</td>
      <td><span class="ticker">${t.ticker || '—'}</span> ${t.name || ''}</td>
      <td><span class="tag-${t.action === 'buy' ? 'buy' : 'sell'}">${t.action === 'buy' ? '买入' : '卖出'}</span></td>
      <td class="price-cell">${fmtMoney(t.price)}</td>
      <td>${t.quantity || 0}</td>
      <td class="${t.action === 'buy' ? 'down' : 'up'}">${t.action === 'buy' ? '-' : '+'}${fmtMoney(amount)}</td>
      <td style="color:var(--text-dim);font-size:11px;">${t.note || '—'}</td>
    </tr>
    `;
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

function renderWeekly(data) {
  const reports = data.weeklyReports || [];
  const container = document.getElementById('weeklyContent');

  if (reports.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📌</div>暂无本周操作计划<br><span style="font-size:11px;">请在 portfolio.json 中添加 weeklyReports 数据</span></div>';
    return;
  }

  let html = '';
  reports.slice().reverse().forEach(r => {
    const icon = r.action === 'buy' ? '📈' : r.action === 'sell' ? '📉' : '👀';
    html += `
    <div class="weekly-item">
      <div class="weekly-icon">${icon}</div>
      <div class="weekly-content">
        <div class="week-label">${r.week || '本周'}</div>
        <div class="stock">${r.ticker || '—'} ${r.name || ''}</div>
        <div class="plan">${r.plan || '—'}</div>
        ${r.reason ? '<div class="plan" style="color:var(--text-dim);font-size:11px;">原因：' + r.reason + '</div>' : ''}
      </div>
    </div>
    `;
  });

  container.innerHTML = html;
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector('.tab-btn[onclick="switchTab(\'' + name + '\')"]').classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// 自动刷新
loadData();
setInterval(loadData, 30000); // 每30秒自动刷新
</script>
</body>
</html>
